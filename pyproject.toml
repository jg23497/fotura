[project]
name = "phototidy"
version = "0.1.0"
description = "A tool to organize and sort photos based on their metadata"
readme = "README.md"
requires-python = ">=3.10"
dependencies = [
    "click>=8.1.0",
    "piexif>=1.1.3",
]

[project.optional-dependencies]
dev = [
    "pytest>=7.0.0",
    "pytest-cov>=4.0.0",
    "black>=24.1.0",
]

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py"]

addopts = [
  "--import-mode=importlib",
  "-s"
]
pythonpath = [
  "."
]

[dependency-groups]
dev = [
    "pytest>=8.3.5",
    "ruff>=0.12.1",
    "ty>=0.0.1a12",
]

[tool.black]
line-length = 88
target-version = ['py310']
include = '\.pyi?$'
extend-exclude = '''
# A regex preceded with ^/ will apply only to files and directories
# in the root of the project.
^/docs
'''
